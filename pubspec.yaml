name: tw_downloader
description: "X下载器 - Flutter 版本"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.2

  # 网络请求
  dio: ^5.7.0

  # 视频播放
  video_player: ^2.9.2
  chewie: ^1.8.5

  # 路由
  go_router: ^14.6.2

  # 本地存储
  shared_preferences: ^2.3.3

  # 文件与路径
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

  # 通知
  flutter_local_notifications: ^18.0.1

  # 瀑布流网格
  flutter_staggered_grid_view: ^0.7.0

  # 应用信息
  package_info_plus: ^8.1.2

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
