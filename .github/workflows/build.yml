name: Build & Release APK

on:
  # 推送到 main/master 分支时构建
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
    # 推送 tag 时构建并创建 Release
    tags:
      - 'v*'

  # 手动触发
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否创建 GitHub Release'
        required: false
        default: 'true'

# 同一时间只运行一个构建
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.0'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 Release 需要

    steps:
      # ============================================================
      # 1. 检出代码
      # ============================================================
      - name: Checkout
        uses: actions/checkout@v4

      # ============================================================
      # 2. 配置 Java 17
      # ============================================================
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ============================================================
      # 3. 配置 Flutter
      # ============================================================
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # ============================================================
      # 4. 打印版本信息
      # ============================================================
      - name: Print versions
        run: |
          flutter --version
          dart --version
          echo "Flutter SDK path: $(flutter --version | head -1)"

      # ============================================================
      # 5. 安装依赖
      # ============================================================
      - name: Install dependencies
        run: flutter pub get

      # ============================================================
      # 6. 配置签名 (从 GitHub Secrets 解码 keystore)
      # ============================================================
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "未配置签名 Secrets，将使用 debug 签名"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          echo "storeFile=app/keystore.jks" > android/key.properties
          echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "key.properties 已生成"

      # ============================================================
      # 7. 构建 Release APK
      # ============================================================
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # ============================================================
      # 8. 构建 Fat APK (兼容所有架构)
      # ============================================================
      - name: Build Fat APK
        run: flutter build apk --release

      # ============================================================
      # 9. 整理产物
      # ============================================================
      - name: Collect APKs
        run: |
          mkdir -p output
          # 复制分架构 APK
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk output/ 2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   output/ 2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk      output/ 2>/dev/null || true
          # 复制 Fat APK
          cp build/app/outputs/flutter-apk/app-release.apk              output/ 2>/dev/null || true
          # 列出产物
          ls -lh output/

      # ============================================================
      # 10. 上传构建产物 (Actions 产物页)
      # ============================================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tw-downloader-apks
          path: output/*.apk
          retention-days: 30

      # ============================================================
      # 11. 创建 GitHub Release (仅 tag 推送或手动选择时)
      # ============================================================
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Build {0}', github.run_number) }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            output/app-armeabi-v7a-release.apk
            output/app-arm64-v8a-release.apk
            output/app-x86_64-release.apk
            output/app-release.apk
